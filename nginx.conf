events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Basic Settings
    sendfile        on;
    keepalive_timeout  65;
    
    # Hide Nginx version
    server_tokens off;

    upstream backend {
        # The backend container name as defined in docker-compose.yml
        server backend:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # FRONTEND: Serve React/Vite application
        # This will run as your main interface on the domain / IP
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            
            # This enables React Router to handle page refreshes correctly
            try_files $uri $uri/ /index.html;
        }

        # FRONTEND (Alternative): Serve React app explicitly on /health if desired
        location /health {
            alias /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # SECURITY: Verify API Access Control Key
        # Clients must pass this key exactly via the x-api-key header.
        # Ensure to update 'your_secure_client_key_here' appropriately.
        location /api/ {
            if ($http_x_api_key != "your_secure_client_key_here") {
                return 401 "Unauthorized: Invalid API Key\n";
            }
            
            # Forward the authorized request to the backend container
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Pass client IP info to the backend securely
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Deny access to sensitive files like .env or .git if accidentally mapped
        location ~ /\. {
            deny all;
        }

        # Drop requests without a valid Host header
        # Update YOUR_DOMAIN_NAME_HERE to your production IP or custom domain!
        if ($host !~ ^(localhost|YOUR_DOMAIN_NAME_HERE)$ ) {
            return 444;
        }
    }
}
