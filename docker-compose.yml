services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: projectx-backend:latest
    container_name: erp_backend
    restart: always
    env_file:
      - .env
    # The backend port is NOT mapped to the host, ensuring it is only accessible via Nginx
    expose:
      - "5000"
    depends_on:
      - redis
    networks:
      - erp_network

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-supersecretredis}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - erp_network

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: projectx-frontend:latest
    container_name: erp_nginx
    restart: always
    ports:
      - "80:80"
      # - "443:443" # Uncomment when SSL is configured
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - erp_network

networks:
  erp_network:
    driver: bridge

volumes:
  redis_data:
